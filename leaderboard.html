<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberCrossword – Live Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12') { e.preventDefault(); return false; }
      if ((e.ctrlKey||e.metaKey) && e.shiftKey && ['I','J','C'].includes(e.key)) { e.preventDefault(); return false; }
      if ((e.ctrlKey||e.metaKey) && e.key === 'u') { e.preventDefault(); return false; }
    });
    if (window.top !== window.self) window.top.location = window.self.location;
  </script>
  <style>
    :root{
      --yellow:#FFD93D; --coral:#FF6B6B; --teal:#4ECDC4;
      --navy:#1A1A2E;   --green:#06D6A0;
      --font-display:'Boogaloo',cursive;
      --font-body:'Nunito',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body);background:var(--navy);color:#fff;min-height:100vh;padding:2rem 1rem;}
    ::selection{background:transparent;}
    .header{text-align:center;margin-bottom:2rem;}
    .header h1{font-family:var(--font-display);font-size:2.8rem;color:var(--yellow);text-shadow:3px 3px 0 var(--coral);letter-spacing:2px;}
    .header h1 span{color:var(--teal);}
    .live-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(6,214,160,0.15);border:1px solid var(--green);border-radius:20px;padding:4px 14px;font-size:0.8rem;font-weight:800;color:var(--green);letter-spacing:1px;margin-top:0.5rem;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.2s ease-in-out infinite;display:inline-block;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
    .tabs{display:flex;justify-content:center;gap:1rem;margin-bottom:1.5rem;}
    .tab-btn{font-family:var(--font-display);font-size:1.1rem;letter-spacing:1px;padding:0.6rem 1.8rem;border-radius:30px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;}
    .tab-btn.active{background:rgba(255,217,61,0.15);border-color:var(--yellow);color:var(--yellow);}
    .stats-bar{display:flex;justify-content:center;gap:1.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
    .stat-chip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:0.5rem 1.2rem;text-align:center;}
    .stat-chip .num{font-family:var(--font-display);font-size:1.6rem;color:var(--teal);display:block;}
    .stat-chip .lbl{font-size:0.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);}
    .lb-wrap{max-width:640px;margin:0 auto;}
    .lb-table{width:100%;border-collapse:separate;border-spacing:0 6px;}
    .lb-table thead th{font-size:0.7rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35);padding:0 1rem 0.5rem;text-align:left;}
    .lb-table thead th.center{text-align:center;} .lb-table thead th.right{text-align:right;}
    .lb-row td{background:rgba(255,255,255,0.04);padding:0.75rem 1rem;font-weight:700;font-size:0.95rem;user-select:none;}
    .lb-row td:first-child{border-radius:10px 0 0 10px;} .lb-row td:last-child{border-radius:0 10px 10px 0;text-align:right;}
    .lb-row.gold   td{background:rgba(255,217,61,0.12);border-left:3px solid var(--yellow);}
    .lb-row.silver td{background:rgba(192,192,192,0.08);}
    .lb-row.bronze td{background:rgba(205,127,50,0.08);}
    .rank-cell{font-family:var(--font-display);font-size:1.2rem;width:48px;text-align:center;color:rgba(255,255,255,0.3);}
    .gold .rank-cell{color:var(--yellow);} .silver .rank-cell{color:#C0C0C0;} .bronze .rank-cell{color:#CD7F32;}
    .score-cell{font-family:var(--font-display);font-size:1.1rem;color:var(--teal);text-align:center;}
    .time-cell{color:rgba(255,255,255,0.4);font-size:0.85rem;text-align:right;}
    .placeholder{text-align:center;padding:3rem;color:rgba(255,255,255,0.3);}
    .last-updated{text-align:center;margin-top:1.5rem;font-size:0.78rem;color:rgba(255,255,255,0.25);}
    ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
  </style>
</head>
<body>

<div class="header">
  <h1>&#x1F575;&#xFE0F; CYBER<span>CROSSWORD</span></h1>
  <div class="live-pill"><span class="dot"></span> LIVE LEADERBOARD</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('main')">&#x1F510; Main Event</button>
  <button class="tab-btn" onclick="switchTab('demo')">&#x1F3E2; Demo</button>
</div>

<div class="stats-bar">
  <div class="stat-chip"><span class="num" id="s-players">-</span><span class="lbl">Players</span></div>
  <div class="stat-chip"><span class="num" id="s-completed">-</span><span class="lbl">Completed</span></div>
  <div class="stat-chip"><span class="num" id="s-top">-</span><span class="lbl">Top Score</span></div>
  <div class="stat-chip"><span class="num" id="s-avg">-</span><span class="lbl">Avg Time</span></div>
</div>

<div class="lb-wrap">
  <table class="lb-table">
    <thead>
      <tr>
        <th style="width:48px" class="center">#</th>
        <th>Player</th>
        <th class="center">Score</th>
        <th class="right">Time</th>
      </tr>
    </thead>
    <tbody id="lb-body">
      <tr><td colspan="4" class="placeholder">Connecting to Firebase...</td></tr>
    </tbody>
  </table>
</div>

<div class="last-updated">
  <span class="dot"></span> Live &middot; Last updated: <span id="refresh-time">-</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const CFG = {
  apiKey:            "AIzaSyCzGV6ZFIiYt4nR9zRltbSNRVgXs61mUwo",
  authDomain:        "rakshaticrossword.firebaseapp.com",
  databaseURL:       "https://rakshaticrossword-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "rakshaticrossword",
  storageBucket:     "rakshaticrossword.firebasestorage.app",
  messagingSenderId: "358152501423",
  appId:             "1:358152501423:web:042896833ccf4066ad3c5a"
};

const db     = getDatabase(initializeApp(CFG));
let   curTab = 'main';
const data   = { main: [], demo: [] };
const unsubs = {};

const fmt = s => s == null ? '-'
  : String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');

const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function proc(snap) {
  if (!snap.exists()) return [];
  return Object.entries(snap.val())
    .map(([k,v]) => ({ key:k, ...v }))
    .filter(e => e.name && e.score != null && e.time != null)
    .sort((a,b) => b.score - a.score || (a.time||999999) - (b.time||999999));
}

function render(entries) {
  const tbody  = document.getElementById('lb-body');
  const medals = ['&#x1F947;','&#x1F948;','&#x1F949;'];
  const cls    = ['gold','silver','bronze'];

  if (!entries.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="placeholder">No scores yet &#x2014; be the first! &#x1F680;</td></tr>';
    updateStats([]);
    return;
  }

  tbody.innerHTML = entries.map((e, i) => `
    <tr class="lb-row ${cls[i] || ''}">
      <td class="rank-cell">${medals[i] || (i+1)}</td>
      <td>${esc(e.name)}</td>
      <td class="score-cell">${e.score}</td>
      <td class="time-cell">${fmt(e.time)}</td>
    </tr>`).join('');

  updateStats(entries);
  document.getElementById('refresh-time').textContent = new Date().toLocaleTimeString();
}

function updateStats(e) {
  const done = e.filter(x => x.score > 0).length;
  document.getElementById('s-players').textContent   = e.length  || '0';
  document.getElementById('s-completed').textContent = done      || '0';
  document.getElementById('s-top').textContent       = e[0]?.score ?? '-';
  document.getElementById('s-avg').textContent       = done
    ? fmt(Math.round(e.reduce((s,x) => s + (x.time||0), 0) / done)) : '-';
}

function subscribe(tab) {
  if (unsubs[tab]) return;
  const path = tab === 'main' ? 'leaderboard' : 'demo-leaderboard';
  unsubs[tab] = onValue(ref(db, path), snap => {
    data[tab] = proc(snap);
    if (curTab === tab) render(data[tab]);
  });
}

window.switchTab = function(tab) {
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', (i===0 && tab==='main') || (i===1 && tab==='demo')));
  render(data[tab]);
  subscribe(tab);
};

// Auto-select tab from URL param — e.g. leaderboard.html?tab=demo
const urlTab = new URLSearchParams(window.location.search).get('tab');
if (urlTab === 'demo') {
  window.switchTab('demo');
} else {
  subscribe('main');
}
</script>
</body>
</html>
